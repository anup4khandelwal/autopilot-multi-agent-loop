# review-os repository configuration
weights:
  engineering: 0.35
  product: 0.25
  design: 0.15
  security: 0.25

thresholds:
  engineering_warning: 70
  product_warning: 70
  design_warning: 75
  security_warning: 75

max_iterations: 3
fail_on_critical: true
policy_preset: startup

reviewer_routing:
  enabled: true
  auto_request: true
  max_reviewers: 3
  risk_based: true
  load_balance_enabled: true
  load_balance_state_file: .reviewos/reviewer-load.json
  load_balance_decay_days: 14
  load_balance_weight: 0.6

labels:
  enabled: true
  critical_label: reviewos:critical
  security_label: reviewos:security
  ready_label: reviewos:ready

fix_suggestions:
  enabled: true
  max_items: 3

reviewer_sla:
  enabled: true
  threshold_hours: 24
  cooldown_hours: 12

incident_safe:
  enabled: false
  security_penalty_multiplier: 1.4
  require_tests_on_sensitive: true
  min_approvals: 1

alerts:
  enabled: false
  slack_webhook_env: SLACK_WEBHOOK_URL
  discord_webhook_env: DISCORD_WEBHOOK_URL
  dedupe_window_minutes: 60
  dedupe_state_file: .reviewos/alerts-state.json
  # optional targeted routing (comma-separated values):
  routes:
    security_critical:
      severity: critical
      lens_contains: Security,PathPolicy
      channels: slack,discord

governance:
  policy_lock: false
  expected_sha256: ""
  signature: ""
  signature_secret_env: REVIEW_OS_SIGNATURE_SECRET

prompt_trace:
  enabled: true
  output_dir: .reviewos/traces

release_gate:
  enabled: true
  title_regex: "^release[:\\s]|^chore\\(release\\):"
  base_branch_regex: "^main$|^release\\/.*$"

finding_ownership:
  default_owner: platform
  rules:
    security_team:
      lens_contains: Security,PathPolicy,IncidentMode
      owner: security
    product_team:
      lens_contains: Product,Design
      owner: product
    platform_team:
      lens_contains: Engineering,ReviewerPolicy,Memory,Trend
      owner: platform

path_overrides:
  auth_paths:
    pattern: src/auth/*
    engineering_penalty: 5
    security_penalty: 8
    require_tests: true
    missing_tests_security_penalty: 25
    require_tests_message: Auth path changes require test updates in the same PR.
    required_users: anup4khandelwal
    # optional reviewer enforcement (comma-separated):
    # required_teams: your-org/security-team
  workflow_paths:
    pattern: .github/workflows/*
    engineering_penalty: 4
    security_penalty: 6
    required_users: anup4khandelwal
    # required_teams: your-org/release-engineering
