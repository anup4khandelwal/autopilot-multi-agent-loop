name: review-os

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, edited]
  workflow_dispatch:
    inputs:
      fail_on_critical:
        description: "Fail job when critical findings exist"
        required: false
        default: "true"

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  FAIL_ON_CRITICAL: ${{ github.event.inputs.fail_on_critical || 'true' }}

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ReviewOS Copilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node src/review.mjs

      - name: Upload Review Memory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewos-history-${{ github.run_id }}
          path: .reviewos/history
          if-no-files-found: ignore
