name: review-os

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, edited]
  workflow_dispatch:
    inputs:
      fail_on_critical:
        description: "Fail job when critical findings exist"
        required: false
        default: "true"

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write

env:
  FAIL_ON_CRITICAL: ${{ github.event.inputs.fail_on_critical || 'true' }}

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ReviewOS Copilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node src/review.mjs

      - name: Build review dashboard
        if: always()
        run: node scripts/build-dashboard.mjs

      - name: Upload Review Memory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewos-history-${{ github.run_id }}
          path: .reviewos/history
          if-no-files-found: ignore

      - name: Upload SARIF Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewos-sarif-${{ github.run_id }}
          path: .reviewos/security-findings.sarif
          if-no-files-found: ignore

      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .reviewos/security-findings.sarif

      - name: Upload Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewos-dashboard-${{ github.run_id }}
          path: |
            docs/review-dashboard.md
            docs/review-dashboard.csv
          if-no-files-found: ignore
