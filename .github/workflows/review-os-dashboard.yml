name: review-os-dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dashboard
        run: |
          node scripts/build-dashboard.mjs
          node scripts/build-ownership-report.mjs

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: reviewos-dashboard-${{ github.run_id }}
          path: |
            docs/review-dashboard.md
            docs/review-dashboard.csv
            docs/repo-baseline.csv
            docs/review-confidence.csv
            docs/reviewer-latency.csv
            docs/change-risk-heatmap.csv
            docs/change-risk-heatmap.json
            docs/policy-drift.csv
            docs/finding-ownership.md
            docs/finding-ownership.csv
