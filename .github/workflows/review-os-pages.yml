name: review-os-pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read
  pull-requests: read
  pages: write
  id-token: write

concurrency:
  group: review-os-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dashboard markdown
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/build-dashboard.mjs
          node scripts/build-debt-ledger.mjs
          node scripts/build-ownership-report.mjs
          node scripts/build-reviewer-queue.mjs
          node scripts/build-executive-digest.mjs
          node scripts/build-badges.mjs

      - name: Render dashboard site
        run: node scripts/render-dashboard-site.mjs

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
